name: Apply

on:
  workflow_dispatch:
    inputs:
      directory:
        description: "Directory to apply (e.g. management, dev, stage, prod)"
        required: true
        default: management

jobs:
  apply:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::324621155013:role/github-actions-apply
          aws-region: us-east-1
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: latest
      - name: init
        run: tofu init
        working-directory: ${{ inputs.directory }}
      - name: plan
        run: tofu plan -input=false -out=tfplan
        working-directory: ${{ inputs.directory }}
      - name: apply
        run: tofu apply -input=false tfplan
        working-directory: ${{ inputs.directory }}
